name: build-HonorFB-kexts

# Builds every HonorFB framebuffer variant on a real macOS runner (real Apple ld64 =
# supports -kext, which ld64.lld does NOT). Each variant is compiled, linked as an
# MH_KEXT_BUNDLE, assembled into a .kext and uploaded as its own artifact.
# No Apple ID needed (MacKernelSDK is public).

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        variant:
          - v0-baseline
          - v1-devicetree
          - v2-ioresources
          - vdiag-panic
          - vpaint-probe
          - vreset-probe
          - v3-iofb
          - v4-offline
          - v5a-contract
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch MacKernelSDK (kernel headers + libkmod)
        run: git clone --depth 1 https://github.com/acidanthera/MacKernelSDK

      - name: Compile (${{ matrix.variant }})
        run: |
          set -euxo pipefail
          V="variants/${{ matrix.variant }}"
          mkdir -p build
          COMMON="-target x86_64-apple-macos11 -DKERNEL -DKERNEL_PRIVATE -DDRIVER_PRIVATE -DAPPLE -DNeXT -nostdinc -fno-builtin -fno-common -mkernel -I MacKernelSDK/Headers -Wall -Wextra"
          clang   -c "$V/kmod_info.c" -o build/kmod_info.o $COMMON
          clang++ -c "$V/driver.cpp"  -o build/driver.o -std=c++17 -x c++ -fapple-kext -fno-rtti -fno-exceptions -fcheck-new -fno-threadsafe-statics $COMMON

      - name: Link (MH_KEXT_BUNDLE)
        run: |
          set -euxo pipefail
          clang++ -o build/HonorFB \
            -arch x86_64 -nostdlib -static \
            -Xlinker -kext -Xlinker -export_dynamic \
            build/driver.o build/kmod_info.o \
            -L MacKernelSDK/Library/universal -lkmod -lkmodc++ -lcc_kext
          echo "--- filetype (must be KEXT_BUNDLE) ---"
          otool -h build/HonorFB

      - name: Assemble bundle
        run: |
          set -euxo pipefail
          B="out/HonorFB-${{ matrix.variant }}.kext"
          mkdir -p "$B/Contents/MacOS"
          cp "variants/${{ matrix.variant }}/Info.plist" "$B/Contents/Info.plist"
          cp build/HonorFB "$B/Contents/MacOS/HonorFB"
          chmod -R 755 "$B"

      - name: Upload HonorFB-${{ matrix.variant }}.kext
        uses: actions/upload-artifact@v4
        with:
          name: HonorFB-${{ matrix.variant }}.kext
          path: out/HonorFB-${{ matrix.variant }}.kext
